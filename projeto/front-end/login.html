<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – BoostPro</title>
  <meta name="description" content="Faça login na sua conta BoostPro." />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark fixed-top" id="mainNav">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
        <i class="bi bi-shield-fill-check text-primary fs-4"></i>
        <span class="brand-text">Boost<span class="text-primary">Pro</span></span>
      </a>
    </div>
  </nav>
  <div class="auth-page d-flex align-items-center justify-content-center">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-12 col-sm-10 col-md-7 col-lg-5">
          <div class="auth-card">
            <div class="auth-card-header text-center">
              <div class="auth-icon mb-3">
                <i class="bi bi-shield-lock-fill"></i>
              </div>
              <h2 class="auth-title">Entrar na conta</h2>
              <p class="text-muted small">Acesse seus serviços de boosting</p>
            </div>
            <div id="alertaLogin" class="alert alert-danger d-none" role="alert">
              <i class="bi bi-x-circle-fill me-2"></i>
              <span id="alertaLoginMsg">E-mail ou senha incorretos.</span>
            </div>
            <form id="formLogin" novalidate>
              <div class="mb-3">
                <label for="email" class="form-label">E-mail</label>
                <div class="input-group input-group-dark">
                  <span class="input-group-text"><i class="bi bi-envelope-fill"></i></span>
                  <input type="email" class="form-control" id="email"
                         placeholder="seu@email.com" autocomplete="email" required />
                </div>
                <div class="invalid-feedback">Informe um e-mail válido.</div>
              </div>
              <div class="mb-4">
                <label for="senha" class="form-label">Senha</label>
                <div class="input-group input-group-dark">
                  <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                  <input type="password" class="form-control" id="senha"
                         placeholder="••••••••" autocomplete="current-password" required />
                  <button class="btn btn-dark border-secondary toggle-password"
                          type="button" data-target="senha">
                    <i class="bi bi-eye-fill"></i>
                  </button>
                </div>
                <div class="invalid-feedback">Informe a senha.</div>
              </div>
              <button type="submit" class="btn btn-primary w-100 btn-lg" id="btnLogin">
                <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
              </button>
            </form>
            <div class="auth-card-footer text-center mt-4">
              <p class="text-muted mb-0">
                Não tem uma conta?
                <a href="cadastro.html" class="text-primary fw-semibold">Criar conta</a>
              </p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <footer class="footer-dark py-4 mt-auto">
    <div class="container text-center">
      <p class="mb-0 text-muted small">
        <i class="bi bi-shield-fill-check text-primary me-2"></i>
        <strong class="text-light">BoostPro</strong> &copy; 2024
      </p>
    </div>
  </footer>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
